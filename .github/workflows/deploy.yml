name: Deploy jbis-screenshot to o2switch

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22" # Aligné sur ta version locale
          cache: npm

      - name: Install dependencies (CI validation)
        run: npm ci

      - name: Validate entrypoint
        run: node --check src/server.js

      - name: Prepare deploy marker
        run: |
          mkdir -p tmp
          echo "Build: ${{ github.sha }} - $(date -u +%Y-%m-%dT%H:%M:%SZ)" > tmp/restart.txt

      # CRUCIAL : On supprime node_modules avant le scan FTP pour éviter le Timeout de 30s
      - name: Clean heavy dependencies before deploy
        run: rm -rf node_modules

      # Déploiement via FTP standard (Identique à tes autres pipelines fonctionnels)
      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ./jbis/screenshot.jbis.cm/
          local-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            .env
            **/*.log
            .DS_Store