name: Deploy jbis-screenshot to o2switch

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies (CI validation)
        run: npm ci

      - name: Validate entrypoint
        run: node --check src/server.js

      - name: Prepare deploy marker
        run: |
          mkdir -p tmp
          echo "Build: ${{ github.sha }} - $(date -u +%Y-%m-%dT%H:%M:%SZ)" > tmp/restart.txt

      # Configuration native de la clé SSH sur le runner GitHub
      - name: Configure SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # Ajoute automatiquement le serveur o2switch aux hôtes connus pour éviter le blocage interactif
          ssh-keyscan -p 22 -H "${{ secrets.FTP_SERVER }}" >> ~/.ssh/known_hosts

      # Déploiement natif avec rsync
      - name: Deploy via Rsync
        run: |
          rsync -avz --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='node_modules/' \
            --exclude='.env' \
            --exclude='*.log' \
            --exclude='.DS_Store' \
            -e "ssh -p 22 -i ~/.ssh/id_ed25519" \
            ./ ${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_SERVER }}:./jbis/screenshot.jbis.cm/