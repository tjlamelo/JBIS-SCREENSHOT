name: Deploy jbis-screenshot to o2switch

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies (CI validation)
        run: npm ci

      - name: Validate entrypoint
        run: node --check src/server.js

      - name: Prepare deploy marker
        run: |
          mkdir -p tmp
          echo "Build: ${{ github.sha }} - $(date -u +%Y-%m-%dT%H:%M:%SZ)" > tmp/restart.txt

      # Connexion SSH sécurisée vers o2switch via Rsync
      - name: Deploy via SSH/Rsync to o2switch
        uses: easingthemes/ssh-deploy@v5.1.0
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          ARGS: "-rlgoDIVzc --delete" # Synchronisation propre, preserve les permissions, supprime l'ancien code sauf ce qui est exclu
          REMOTE_HOST: ${{ secrets.FTP_SERVER }} # Votre hôte (ex: serveur.o2switch.net)
          REMOTE_USER: ${{ secrets.FTP_USERNAME }} # Votre identifiant cPanel
          REMOTE_PORT: 22
          TARGET: "./jbis/screenshot.jbis.cm/" # Dossier cible sur o2switch
          SOURCE: "./" # On déploie la racine du projet
          EXCLUDE: |
            /.git/
            /.github/
            /node_modules/
            /.env
            /*.log
            .DS_Store