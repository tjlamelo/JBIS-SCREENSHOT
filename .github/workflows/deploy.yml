name: Deploy jbis-screenshot to o2switch

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies (CI validation)
        run: npm ci

      - name: Validate entrypoint
        run: node --check src/server.js

      - name: Prepare deploy marker
        run: |
          mkdir -p tmp
          echo "Build: ${{ github.sha }} - $(date -u +%Y-%m-%dT%H:%M:%SZ)" > tmp/restart.txt

      # node_modules/ exclu : trop lourd (Puppeteer + Chromium).
      # .env exclu pour ne pas écraser la prod.
      - name: Deploy via SFTP to o2switch
        uses: sshagency/sftp-deploy-action@v2.2.1
        with:
          host: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 22 # o2switch utilise le port 22 pour le SFTP
          local-dir: './'
          server-dir: './jbis/screenshot.jbis.cm/'
          exclude: |
            .git
            .github
            node_modules
            .env
            *.log
            .DS_Store