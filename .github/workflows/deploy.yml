name: Deploy jbis-screenshot to o2switch

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22" # Passé en v22 pour corriger les alertes "Unsupported engine" de Puppeteer
          cache: npm

      - name: Install dependencies (CI validation)
        run: npm ci

      - name: Validate entrypoint
        run: node --check src/server.js

      - name: Prepare deploy marker
        run: |
          mkdir -p tmp
          echo "Build: ${{ github.sha }} - $(date -u +%Y-%m-%dT%H:%M:%SZ)" > tmp/restart.txt

      # Déploiement Rsync avec les bons noms de variables
      - name: Deploy via SSH/Rsync to o2switch
        uses: easingthemes/ssh-deploy@v5.1.0
        with:
          ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }} # En minuscules pour cette action
          remote_host: ${{ secrets.FTP_SERVER }}
          remote_user: ${{ secrets.FTP_USERNAME }}
          remote_port: 22
          target: "./jbis/screenshot.jbis.cm/"
          source: "./"
          args: "-rlgoDIVzc --delete"
          exclude: |
            /.git/
            /.github/
            /node_modules/
            /.env
            /*.log
            .DS_Store